<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KERI 공공부문 AI 활용교육 패키지</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="한국교육연구소(KERI) AI활용교육 강사단 공공부문 교육 프로젝트 패키지">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Docsify Vue Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /* Custom Styling for Premium Brand Identity */
    :root {
      --theme-color: #0b5ed7; /* KERI Blue */
    }
    .sidebar {
      background-color: #f8f9fa;
      border-right: 1px solid #e9ecef;
    }
    .sidebar-nav strong {
      color: #212529;
      font-size: 1.05rem;
      display: block;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px dashed #ced4da;
      padding-bottom: 0.25rem;
    }
    .markdown-section {
      max-width: 850px;
    }
  </style>
</head>
<body>
  <div id="app">문서 로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'KERI AI 공공교육',
      repo: 'armin1108-hue/KERI-AI-',
      homepage: 'KERI_AI_PUBLIC_SECTOR_TRAINING/README.md',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '검색어를 입력하세요...',
        noData: '검색 결과가 없습니다!',
        depth: 6
      }
    }
  </script>
  <!-- Docsify Core -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Docsify Plugins (Search and Copy Code) -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  
  <!-- Mermaid Support & Integrated Docsify Plugin -->
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    
    // startOnLoad를 false로 설정하여 수동 렌더링 모드로 초기화
    mermaid.initialize({ 
      startOnLoad: false,
      theme: 'default'
    });
    
    // docsify 플러그인을 동적으로 추가하여 실행 순서 보장
    window.$docsify = window.$docsify || {};
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function(hook, vm) {
        // 마크다운 페이지 렌더링 시 pre[data-lang=mermaid] 요소를 div.mermaid로 변환
        hook.afterEach(function(html, next) {
          var htmlElement = document.createElement('div');
          htmlElement.innerHTML = html;
          htmlElement.querySelectorAll('pre[data-lang=mermaid]').forEach(function(element) {
            var replacement = document.createElement('div');
            replacement.textContent = element.textContent;
            replacement.classList.add('mermaid');
            element.parentNode.replaceChild(replacement, element);
          });
          next(htmlElement.innerHTML);
        });
        
        // 페이지가 DOM에 로드 완료된 후 mermaid 다이어그램 렌더링 실행
        hook.doneEach(function() {
          mermaid.run({
            querySelector: '.mermaid'
          });
        });
      }
    ]);
  </script>
</body>
</html>
